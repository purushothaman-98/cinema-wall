name: Apply Codex free quota patch

on:
  push:
    branches: [main]
    paths:
      - ".codex-patches/free-quota-channel-eval.patch"
      - ".github/workflows/apply-codex-free-quota.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-free-quota-patch
  cancel-in-progress: false

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply patch and validate
        run: |
          if [ ! -f .codex-patches/free-quota-channel-eval.patch ]; then
            echo "Patch file is not present yet; waiting for patch commit."
            exit 0
          fi
          git apply --check .codex-patches/free-quota-channel-eval.patch
          git apply .codex-patches/free-quota-channel-eval.patch
          python -m py_compile app.py scanner.py collectors.py data.py youtube_analysis.py
          python -m json.tool scanner_config.json >/tmp/scanner_config.json
      - name: Commit real changes and remove temporary files
        run: |
          git config user.name "codex"
          git config user.email "actions@users.noreply.github.com"
          rm -f .codex-patches/free-quota-channel-eval.patch
          rmdir .codex-patches 2>/dev/null || true
          rm -f .github/workflows/apply-codex-free-quota.yml
          git add .github/workflows/youtube-monitor.yml app.py scanner.py scanner_config.json .github/workflows/apply-codex-free-quota.yml .codex-patches/free-quota-channel-eval.patch
          git commit -m "Tune YouTube quota and add channel evaluation"
          git pull --rebase
          git push
