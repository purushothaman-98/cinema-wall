name: Weekly Tamil film scan

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tamil-film-weekly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Discover films and scan public discussions
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: python scanner.py
      - name: Publish refreshed wall data
        run: |
          git config user.name "tamil-film-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live/comments.csv data/live/scan_metadata.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh weekly Tamil film wall"
          git push
